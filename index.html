<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CS Interview Prep Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-icon">&lt;/&gt;</div>
        <div>
          <h1>CS Interview Prep</h1>
          <p>Professional fresher toolkit</p>
        </div>
      </div>
      <nav id="nav"></nav>
      <div class="side-card">
        <div class="eyebrow">Focus today</div>
        <h3>Execution over reading</h3>
        <p>Solve one MCQ set, revise flashcards, and improve one resume bullet.</p>
      </div>
    </aside>

    <main class="content">
      <header class="topbar">
        <div>
          <div class="eyebrow">Pro UI</div>
          <h2 id="pageTitle">Dashboard</h2>
        </div>
        <div class="top-actions">
          <button class="btn btn-secondary" id="menuBtn">Menu</button>
          <button class="btn" id="resetBtn">Reset Progress</button>
        </div>
      </header>

      <section id="dashboard" class="page active"></section>
      <section id="roadmap" class="page"></section>
      <section id="analytical" class="page"></section>
      <section id="logical" class="page"></section>
      <section id="technical" class="page"></section>
      <section id="flashcards" class="page"></section>
      <section id="mocktests" class="page"></section>
      <section id="videos" class="page"></section>
      <section id="resume" class="page"></section>
      <section id="hr" class="page"></section>
      <section id="tasks" class="page"></section>
      <section id="company" class="page"></section>

      <footer class="footer">
        <div class="footer-meta">
          <strong>Feedback / Comments</strong>
          <span>Date: <span id="footerDate"></span></span>
          <span>Name: <span id="footerName"></span></span>
          <span>Email: <a id="footerEmailLink" href="#"><span id="footerEmail"></span></a></span>
        </div>
        <textarea id="feedbackText" placeholder="Type comments, enhancement ideas, or interview content requests here..."></textarea>
      </footer>
    </main>
  </div>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
